{% extends "base.html" %}

{% block title %}{{ _('Log in') }} — MindixoAI{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
  <div class="col-11 col-sm-10 col-md-6 col-lg-5">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4 p-md-5">
        <h4 class="fw-semibold mb-1">{{ _('Log in') }}</h4>
        <p class="text-muted small mb-4">{{ _('Sign in to use AI tools and manage your credits.') }}</p>

        <form method="post" action="{{ url_for('auth.login') }}" novalidate>
          <div class="mb-3">
            <label for="email" class="form-label">{{ _('Email') }}</label>
            <input type="email" class="form-control form-control-lg" id="email" name="email"
                   placeholder="{{ _('Email placeholder') }}" required autofocus
                   value="{{ request.form.email or '' }}">
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">{{ _('Password') }}</label>
            <input type="password" class="form-control form-control-lg" id="password" name="password"
                   placeholder="{{ _('Password placeholder') }}" required>
          </div>
          <div class="mb-4">
            <div class="form-check">
              <input type="checkbox" class="form-check-input" id="remember" name="remember" value="1">
              <label class="form-check-label text-muted small" for="remember">{{ _('Remember me') }}</label>
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-lg w-100 mb-3">{{ _('Log in') }}</button>
        </form>

        <p class="text-center text-muted small mb-0">
          {{ _("Don't have an account?") }}
          <a href="{{ url_for('auth.register') }}" class="text-decoration-none fw-medium">{{ _('Sign up') }}</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
