<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" aria-hidden="true">
  <defs>
    <!-- Left band: blue base → cyan toward peak/crossing -->
    <linearGradient id="ribbonL" x1="0%" y1="100%" x2="85%" y2="5%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="45%" style="stop-color:#2563eb"/>
      <stop offset="85%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <!-- Right band: deep violet base → lavender peak → cyan at crossing -->
    <linearGradient id="ribbonR" x1="100%" y1="100%" x2="15%" y2="5%">
      <stop offset="0%" style="stop-color:#4c1d95"/>
      <stop offset="35%" style="stop-color:#7c3aed"/>
      <stop offset="70%" style="stop-color:#c4b5fd"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <!-- Crossing highlight (diamond) -->
    <linearGradient id="cross" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#67e8f9"/>
      <stop offset="50%" style="stop-color:#a5f3fc"/>
      <stop offset="100%" style="stop-color:#ddd6fe"/>
    </linearGradient>
  </defs>
  <!-- Left ribbon: rounded foot → left peak → inner leg into central V -->
  <path fill="url(#ribbonL)" d="M 10.5 41.5
    C 8.8 41.2 7.8 39.5 8 37.8
    C 8.5 28 10.5 17 15.5 11.2
    C 17.8 8.5 20.5 7.2 23.2 8.2
    C 24.2 8.6 24.8 9.4 24.6 10.5
    C 24.2 13.5 23.4 16.8 23.3 20.5
    C 23.2 25.5 24.2 29.8 26 32.2
    C 23.8 34.5 18.2 36.2 14.2 38.8
    C 12.5 40 11.2 41 10.5 41.5 Z"/>
  <!-- Right ribbon: mirror -->
  <path fill="url(#ribbonR)" d="M 37.5 41.5
    C 39.2 41.2 40.2 39.5 40 37.8
    C 39.5 28 37.5 17 32.5 11.2
    C 30.2 8.5 27.5 7.2 24.8 8.2
    C 23.8 8.6 23.2 9.4 23.4 10.5
    C 23.8 13.5 24.6 16.8 24.7 20.5
    C 24.8 25.5 23.8 29.8 22 32.2
    C 24.2 34.5 29.8 36.2 33.8 38.8
    C 35.5 40 36.8 41 37.5 41.5 Z"/>
  <!-- Central crossing (diamond) — luminous blend where bands cross -->
  <path fill="url(#cross)" fill-opacity="0.42" d="M 24 9.2 L 26.2 12.4 L 24.1 24.6 L 21.8 12.4 Z"/>
</svg>
